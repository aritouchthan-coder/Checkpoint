<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Checkpoint Scanner</title>

<script src="https://cdn.jsdelivr.net/npm/@zxing/library@0.21.3/umd/index.min.js"></script>

<style>
body{font-family:sans-serif;background:#667eea;color:#fff;padding:20px}
.card{background:#fff;color:#000;padding:20px;border-radius:12px;margin-bottom:15px}
.hidden{display:none}
button{padding:10px;border:none;border-radius:8px;background:#667eea;color:#fff}
.done{color:green;font-weight:bold}
.not{color:red;font-weight:bold}
</style>
</head>

<body>

<div id="loginCard" class="card">
<h3>เลือกผู้ใช้</h3>
<select id="loginUser"></select>
<button onclick="login()">เข้าใช้งาน</button>
</div>

<div id="app" class="hidden">

<div class="card">
ผู้ใช้: <b id="user"></b>
<button onclick="logout()">ออก</button>
<button onclick="adminLogin()">Admin</button>
</div>

<div id="adminPanel" class="card hidden">
<h3>Admin Panel</h3>

<h4>Users</h4>
<input id="u_user" placeholder="username">
<input id="u_name" placeholder="name">
<input id="u_role" placeholder="role">
<button onclick="saveUser()">save</button>
<table id="usersTable"></table>

<h4>Points</h4>
<input id="p_id" placeholder="id">
<input id="p_name" placeholder="name">
<input id="p_bar" placeholder="barcode">
<button onclick="savePoint()">save</button>
<table id="pointsTable"></table>

<button onclick="clearLogs()">ล้าง Logs</button>
</div>

<div class="card">
<h3>สแกน</h3>
<button onclick="startScan()">เริ่ม</button>
<button onclick="stopScan()">หยุด</button>
<video id="preview" width="100%"></video>
<div id="result"></div>
</div>

<div class="card">
<h3>Dashboard</h3>
<div>ทั้งหมด <b id="total"></b></div>
<div>เสร็จ <b id="done"></b></div>
<div>ยังไม่ <b id="not"></b></div>
<table id="table"></table>
</div>

</div>

<script src="app.js"></script>
</body>
</html>
