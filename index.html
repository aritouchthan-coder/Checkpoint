<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Checkpoint Scanner</title>

  <script src="https://cdn.jsdelivr.net/npm/@zxing/library@0.21.3/umd/index.min.js"></script>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="container">
    <div class="header-title">
      <h1>📷 Checkpoint Scanner</h1>
      <p>ระบบสแกนจุดตรวจประจำวัน</p>
    </div>

    <div id="loginCard" class="card">
      <h3>👤 เลือกผู้ใช้งาน</h3>
      <select id="loginUser"></select>
      <button id="confirmUserBtn">✓ เริ่มใช้งาน</button>
      <div id="loginMsg" class="muted"></div>
    </div>

    <div id="app" class="hidden">

      <div class="card">
        <div class="space-between">
          <div>
            <strong>ผู้ใช้งาน:</strong>
            <span id="lockedUserPill" class="pill"></span>
          </div>

          <div class="top-buttons">
            <button class="secondary" id="adminBtn">⚙️ Admin</button>
            <button class="secondary" id="changeUserBtn">🔄 เปลี่ยน</button>
          </div>
        </div>
      </div>

      <div class="card">
        <h3>📷 สแกน</h3>

        <div class="btn-row">
          <button id="startBtn">▶️ เริ่ม</button>
          <button id="stopBtn" disabled>⏹️ หยุด</button>
          <span id="status" class="status-pill">พร้อม</span>
        </div>

        <video id="preview" playsinline autoplay muted></video>

        <div id="scanResult" class="muted">รอสแกน...</div>
        <div class="muted">* สแกนเท่านั้น ไม่มีช่องพิมพ์</div>
      </div>

      <div class="card">
        <h3>📊 Dashboard</h3>

        <div class="dashboard-summary">
          <div class="summary-box">
            <span>ทั้งหมด</span>
            <strong id="totalPoints">0</strong>
          </div>
          <div class="summary-box done-box">
            <span>สแกนแล้ว</span>
            <strong id="donePoints">0</strong>
          </div>
          <div class="summary-box not-box">
            <span>ยังไม่สแกน</span>
            <strong id="notDonePoints">0</strong>
          </div>
        </div>

        <table id="dashboardTable"></table>
      </div>

    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
